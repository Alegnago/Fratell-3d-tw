<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fratelli — 3D</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #F5F5F3; }
    #app { position: fixed; inset: 0; cursor: grab; }
    #app.dragging { cursor: grabbing; }
    canvas { display: block; }
    #panel-toggle {
      position: fixed; top: 14px; right: 14px; z-index: 10;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid #16161633; background: #ffffffcc;
      cursor: pointer; font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-toggle.active { background: #161616; color: #fff; }
    .panel-host { position: fixed !important; top: 60px; right: 14px; z-index: 10; width: 290px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <button id="panel-toggle" title="Controlli">⚙</button>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
